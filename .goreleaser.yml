before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
      - 386
    goarm:
      - 6
      - 7
    ignore:
      - goos: darwin
        goarch: 386
      - goos: windows
        goarch: arm
      - goos: freebsd
        goarch: arm
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    binary: cachestorm

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - config/**/*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: cachestorm
    name: cachestorm
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## CacheStorm {{ .Tag }}

    A high-performance Redis-compatible in-memory database with 1,600+ commands.
  footer: |
    ## Installation

    ### Binary Download
    Download the binary for your platform from the assets below.

    ### Docker
    ```bash
    docker pull ghcr.io/cachestorm/cachestorm:{{ .Tag }}
    ```

    ### Build from Source
    ```bash
    go install github.com/cachestorm/cachestorm@{{ .Tag }}
    ```

    **Full Changelog**: https://github.com/cachestorm/cachestorm/compare/{{ .PreviousTag }}...{{ .Tag }}

nfpms:
  - id: cachestorm
    package_name: cachestorm
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    homepage: https://github.com/cachestorm/cachestorm
    maintainer: CacheStorm Team <team@cachestorm.dev>
    description: High-performance Redis-compatible in-memory database
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    contents:
      - src: ./config/cachestorm.example.yaml
        dst: /etc/cachestorm/cachestorm.yaml
        type: config

universal_binaries:
  - replace: true
    name_template: cachestorm
