# CacheStorm Configuration Example
# Copy this file to cachestorm.yaml and customize

# Server Configuration
server:
  # Bind address (0.0.0.0 for all interfaces)
  bind: "0.0.0.0"

  # TCP port for RESP server
  port: 6380

  # Maximum simultaneous connections
  max_connections: 10000

  # TCP keepalive in seconds
  tcp_keepalive: 300

  # Buffer sizes
  read_buffer_size: 4096
  write_buffer_size: 4096

  # Timeouts (0 = no timeout)
  read_timeout: "5m"
  write_timeout: "5m"

  # Authentication password (empty = no auth required)
  # Clients must AUTH before running commands when set
  requirepass: ""

  # TLS Configuration (empty = plaintext)
  # tls_cert_file: "/etc/cachestorm/tls/server.crt"
  # tls_key_file: "/etc/cachestorm/tls/server.key"

# HTTP Admin API
http:
  enabled: true
  port: 8080
  # HTTP API password (empty = no auth)
  password: ""

# Memory Management
memory:
  # Maximum memory usage (0 = unlimited)
  # Examples: "1gb", "512mb", "256mb"
  max_memory: "0"

  # Eviction policy when memory limit is reached
  # Options: noeviction, allkeys-lru, allkeys-lfu, volatile-lru, allkeys-random
  eviction_policy: "allkeys-lru"

  # Memory pressure thresholds (percentage)
  pressure_warning: 70
  pressure_critical: 85

  # Number of keys to sample during eviction
  eviction_sample_size: 5

# Persistence Configuration
persistence:
  enabled: false

  # AOF (Append-Only File)
  aof: true
  # Sync policy: always, everysec, no
  aof_sync: "everysec"

  # Data directory for AOF/RDB files
  data_dir: "/var/lib/cachestorm"

  # Snapshot interval
  snapshot_interval: "5m"

# Replication
replication:
  # Role: master or slave
  role: "master"
  # master_host: ""
  # master_port: 6380
  # master_auth: ""
  read_only: true

# Cluster Configuration
cluster:
  enabled: false
  # node_name: "node1"
  bind_addr: "0.0.0.0"
  bind_port: 7946
  # seeds:
  #   - "node1:7946"
  #   - "node2:7946"

# Logging Configuration
logging:
  # Log level: debug, info, warn, error
  level: "info"
  # Log format: console, json
  format: "console"
  # Output: stdout, stderr
  output: "stdout"

# Namespace Configuration
namespaces:
  default:
    default_ttl: "0"
  # cache:
  #   default_ttl: "1h"
  # sessions:
  #   default_ttl: "30m"

# Plugin Configuration
plugins:
  stats:
    enabled: true
  metrics:
    enabled: true
    port: 9090
    path: "/metrics"
  auth:
    enabled: false
    password: ""
  slowlog:
    enabled: true
    threshold: "10ms"
    max_entries: 128
