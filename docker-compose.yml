version: '3.8'

services:
  cachestorm:
    image: cachestorm/cachestorm:latest
    container_name: cachestorm
    ports:
      - "6379:6379"
      - "8080:8080"
    volumes:
      - cachestorm-data:/data
      - ./config:/etc/cachestorm:ro
    environment:
      - CACHESTORM_CONFIG=/etc/cachestorm/cachestorm.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - cachestorm-network

  # Optional: Redis Insight for GUI management
  redisinsight:
    image: redis/redisinsight:latest
    container_name: cachestorm-insight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    restart: unless-stopped
    networks:
      - cachestorm-network
    profiles:
      - gui

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: cachestorm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - cachestorm-network
    profiles:
      - monitoring

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: cachestorm-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    networks:
      - cachestorm-network
    profiles:
      - monitoring

volumes:
  cachestorm-data:
    driver: local
  redisinsight-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  cachestorm-network:
    driver: bridge
