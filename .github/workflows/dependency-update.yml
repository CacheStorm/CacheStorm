name: Dependency Update

on:
  schedule:
    # Run every Monday at 3 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update-deps:
    name: Update Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Update dependencies
        run: |
          go get -u ./...
          go mod tidy
          go mod verify

      - name: Run tests
        run: go test ./... -short

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update Go dependencies'
          title: 'chore(deps): update Go dependencies'
          body: |
            This PR updates Go dependencies to their latest versions.

            ## Changes
            - Updated all dependencies to latest versions
            - Ran `go mod tidy` to clean up

            ## Verification
            - [ ] Tests pass
            - [ ] No breaking changes
            - [ ] Security vulnerabilities addressed

            Auto-generated by GitHub Actions.
          branch: deps/update-go-modules
          delete-branch: true
          labels: dependencies,automated

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
