name: Nightly Build

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  GO_VERSION: '1.22'

jobs:
  build:
    name: Nightly Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build nightly
        run: |
          VERSION="nightly-${{ steps.date.outputs.date }}"
          go build -ldflags "-s -w -X main.version=$VERSION" -o cachestorm-nightly ./cmd/cachestorm

      - name: Run tests
        run: go test ./... -short

      - name: Create nightly release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: Nightly Build (${{ steps.date.outputs.date }})
          body: |
            This is an automated nightly build of CacheStorm.

            **Warning:** Nightly builds are unstable and for testing purposes only.

            ## Installation
            ```bash
            # Download and run
            wget https://github.com/cachestorm/cachestorm/releases/download/nightly/cachestorm-nightly
            chmod +x cachestorm-nightly
            ./cachestorm-nightly
            ```
          files: cachestorm-nightly
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  docker-nightly:
    name: Docker Nightly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nightly
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            cachestorm/cachestorm:nightly
            ghcr.io/cachestorm/cachestorm:nightly
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    name: Cleanup Old Nightly Releases
    runs-on: ubuntu-latest
    needs: [build, docker-nightly]
    steps:
      - name: Delete old nightly releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        with:
          keep_latest: 5
          delete_tag_pattern: nightly
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
