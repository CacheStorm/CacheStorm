name: Release Simple

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.28)'
        required: true
        type: string

env:
  GO_VERSION: '1.22'

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./internal/... -v

      - name: Build test
        run: go build -v ./cmd/cachestorm

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build binaries
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          mkdir -p dist

          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=$VERSION" -o dist/cachestorm-linux-amd64 ./cmd/cachestorm

          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.version=$VERSION" -o dist/cachestorm-linux-arm64 ./cmd/cachestorm

          # macOS AMD64
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.version=$VERSION" -o dist/cachestorm-darwin-amd64 ./cmd/cachestorm

          # macOS ARM64
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.version=$VERSION" -o dist/cachestorm-darwin-arm64 ./cmd/cachestorm

          # Windows AMD64
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.version=$VERSION" -o dist/cachestorm-windows-amd64.exe ./cmd/cachestorm

      - name: Create archives
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          cd dist

          for binary in cachestorm-*; do
            if [[ "$binary" == *.exe ]]; then
              name="${binary%.exe}"
              zip "${name}.zip" "$binary"
            else
              tar -czf "${binary}.tar.gz" "$binary"
            fi
          done

          ls -la

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "CacheStorm ${{ steps.get_version.outputs.version }}"
          body: |
            ## CacheStorm ${{ steps.get_version.outputs.version }}

            ### Binaries

            | Platform | Architecture | Download |
            |----------|-------------|----------|
            | Linux | AMD64 | [cachestorm-linux-amd64.tar.gz](https://github.com/CacheStorm/CacheStorm/releases/download/${{ steps.get_version.outputs.version }}/cachestorm-linux-amd64.tar.gz) |
            | Linux | ARM64 | [cachestorm-linux-arm64.tar.gz](https://github.com/CacheStorm/CacheStorm/releases/download/${{ steps.get_version.outputs.version }}/cachestorm-linux-arm64.tar.gz) |
            | macOS | AMD64 | [cachestorm-darwin-amd64.tar.gz](https://github.com/CacheStorm/CacheStorm/releases/download/${{ steps.get_version.outputs.version }}/cachestorm-darwin-amd64.tar.gz) |
            | macOS | ARM64 | [cachestorm-darwin-arm64.tar.gz](https://github.com/CacheStorm/CacheStorm/releases/download/${{ steps.get_version.outputs.version }}/cachestorm-darwin-arm64.tar.gz) |
            | Windows | AMD64 | [cachestorm-windows-amd64.zip](https://github.com/CacheStorm/CacheStorm/releases/download/${{ steps.get_version.outputs.version }}/cachestorm-windows-amd64.zip) |

            ### Quick Install

            **Linux/macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/CacheStorm/CacheStorm/main/scripts/install.sh | bash
            ```

            **Windows:**
            ```powershell
            irm https://raw.githubusercontent.com/CacheStorm/CacheStorm/main/scripts/install.ps1 | iex
            ```

            ### Docker
            ```bash
            docker pull cachestorm/cachestorm:${{ steps.get_version.outputs.version }}
            ```
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/cachestorm/cachestorm:${{ steps.get_version.outputs.version }}
            ghcr.io/cachestorm/cachestorm:latest
            cachestorm/cachestorm:${{ steps.get_version.outputs.version }}
            cachestorm/cachestorm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true
