name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.28)'
        required: true
        type: string

env:
  GO_VERSION: '1.22'

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./internal/... -v

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: freebsd
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          OUTPUT="cachestorm"
          if [ "$GOOS" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi
          go build -ldflags="-s -w -X main.version=$VERSION" -o $OUTPUT ./cmd/cachestorm

      - name: Create archive
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          GOOS="${{ matrix.goos }}"
          GOARCH="${{ matrix.goarch }}"
          GOARM="${{ matrix.goarm }}"

          ARCH="$GOARCH"
          if [ -n "$GOARM" ]; then
            ARCH="${ARCH}v${GOARM}"
          fi

          if [ "$GOOS" = "windows" ]; then
            zip "cachestorm_${VERSION}_${GOOS}_${ARCH}.zip" cachestorm.exe
          else
            tar -czf "cachestorm_${VERSION}_${GOOS}_${ARCH}.tar.gz" cachestorm
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cachestorm-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: cachestorm_*

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/cachestorm/cachestorm:${{ steps.get_version.outputs.version }}
            ghcr.io/cachestorm/cachestorm:latest
            cachestorm/cachestorm:${{ steps.get_version.outputs.version }}
            cachestorm/cachestorm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "CacheStorm ${{ steps.get_version.outputs.version }}"
          body: |
            ## CacheStorm ${{ steps.get_version.outputs.version }}

            ### Binaries

            | Platform | Architecture | Download |
            |----------|-------------|----------|
            | Linux | AMD64 | cachestorm_${{ steps.get_version.outputs.version }}_linux_amd64.tar.gz |
            | Linux | ARM64 | cachestorm_${{ steps.get_version.outputs.version }}_linux_arm64.tar.gz |
            | Linux | ARMv7 | cachestorm_${{ steps.get_version.outputs.version }}_linux_armv7.tar.gz |
            | macOS | AMD64 | cachestorm_${{ steps.get_version.outputs.version }}_darwin_amd64.tar.gz |
            | macOS | ARM64 | cachestorm_${{ steps.get_version.outputs.version }}_darwin_arm64.tar.gz |
            | Windows | AMD64 | cachestorm_${{ steps.get_version.outputs.version }}_windows_amd64.zip |
            | FreeBSD | AMD64 | cachestorm_${{ steps.get_version.outputs.version }}_freebsd_amd64.tar.gz |

            ### Quick Install

            **Linux/macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/CacheStorm/CacheStorm/main/scripts/install.sh | bash
            ```

            **Windows:**
            ```powershell
            irm https://raw.githubusercontent.com/CacheStorm/CacheStorm/main/scripts/install.ps1 | iex
            ```

            ### Docker
            ```bash
            docker pull ghcr.io/cachestorm/cachestorm:${{ steps.get_version.outputs.version }}
            ```
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
